<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="sidebar">
    <button class="nav-btn" onclick="go('/news/main')">🔐 Login</button>
    <button class="nav-btn" onclick="go('/news/account.html')">⚙️ Settings</button>
    <button class="nav-btn" onclick="go('https://v987v654v321v0-dot.github.io/ARTGAME.html')">🕹️ Play Guess the Drawing</button>
    <button class="nav-btn" onclick="go('https://v987v654v321v0-dot.github.io/Services/Wallet/Plan')">💰 Use Tokens to Buy Ultra Plan</button>
    <button class="nav-btn" onclick="go('https://v987v654v321v0-dot.github.io/Services/Wallet/Main')">💳 Check Token Wallet</button>
    <button class="nav-btn" onclick="toggleNotify(event)">🔔 Notify: OFF</button>
    <button class="nav-btn" id="editProfileBtn" onclick="toggleProfileMenu(event)">👤 Edit Profile</button>

    <div id="chatTypePanel">
      <div class="chat-type-title">💬 Chat Type</div>

      <select id="chatTypeSelect" onchange="changeChatType()">
        <option value="1">Type 1 — Hide 67 and banana</option>
        <option value="2">Type 2 — Custom user filter</option>
        <option value="3">Type 3 — Only 67 and banana</option>
      </select>

      <div id="chatType2Options">
        <select id="customFilterMode" onchange="saveChatTypeSettings()">
          <option value="only">Only show these users</option>
          <option value="hide">Hide these users</option>
        </select>

        <input
          id="customUserList"
          placeholder="Example: alice, bob, charlie"
          oninput="saveChatTypeSettings()"
        />

        <div class="small-note">
          Separate usernames with commas.
        </div>
      </div>
    </div>

    <div id="chatTypePanel">
      <div class="chat-type-title">🧭 Rooms</div>
      <button class="nav-btn" onclick="switchRoom('main')" style="padding:10px;">🌍 Main Chat</button>
      <button class="nav-btn" onclick="openCreateGroupPrompt()" style="padding:10px;">➕ Create Group</button>
      <button class="nav-btn" id="adminAllMessagesBtn" onclick="switchRoom('all')" style="padding:10px; display:none;">🛡️ all Messages</button>

      <div class="small-note">Groups you are in:</div>
      <div id="groupList" style="display:flex; flex-direction:column; gap:6px;"></div>
    </div>
  </div>

  <div id="main">

    <div id="filterBar">
      <input id="filterInput" placeholder="Filter by username..." />
      <button id="filterBtn" onclick="applyFilter()">Filter</button>
      <div id="roomTitle" style="padding:8px 12px; background:#383a40; border-radius:6px; white-space:nowrap;">
        🌍 Main Chat
      </div>
    </div>

    <div id="chat"></div>

    <div id="emojiBar">
      <span class="emoji" onclick="sendEmoji('🔥')">🔥</span>
      <span class="emoji" onclick="sendEmoji('😂')">😂</span>
      <span class="emoji" onclick="sendEmoji('❤️')">❤️</span>
      <span class="emoji" onclick="sendEmoji('👍')">👍</span>
      <span class="emoji" onclick="sendEmoji('😎')">😎</span>
      <span class="emoji" onclick="sendEmoji('😭')">😭</span>
      <span class="emoji" onclick="sendEmoji('🎉')">🎉</span>
      <span class="emoji" onclick="sendEmoji('😡')">😡</span>
      <span class="emoji" onclick="sendEmoji('🤯')">🤯</span>
      <span class="emoji" onclick="sendEmoji('👀')">👀</span>
      <span class="emoji" onclick="sendEmoji('👁️')">👁️</span>
    </div>

    <div id="privateMenu"></div>

    <div id="profileMenu">
      <div id="planStatusBadge" class="plan-badge free">Checking plan...</div>

      <div class="profile-label">Current profile picture</div>
      <div class="current-pic-row">
        <img id="currentPicPreview" class="current-pic-preview" src="user.png" alt="Current profile picture" onerror="this.src='user.png'">
        <div class="current-pic-text" id="currentPicText">No picture selected</div>
      </div>

      <div class="profile-label">Choose profile picture</div>
      <div id="profilePicGrid" class="profile-pic-grid"></div>

      <div class="profile-label">Description</div>
      <input id="descInput" placeholder="Set your description..." />

      <div class="profile-actions">
        <button onclick="saveProfile()">Save</button>
        <button onclick="closeProfileMenu()">Close</button>
      </div>
    </div>

    <div id="userProfilePopup"></div>

    <div id="bar">
      <input id="msg" placeholder="Type message..." />
      <button class="send" onclick="send()">Send</button>
      <button class="send" id="privateBtn" onclick="togglePrivateMenu(event)">Private</button>
    </div>

  </div>

  <script src="script2.js"></script>
</body>
</html>
