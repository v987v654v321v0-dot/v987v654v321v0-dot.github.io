<!DOCTYPE html>
<html>
<head>
  <title>Cloud Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #313338;
      color: white;
    }

    #chat {
      height: 90vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      background: #2b2d31;
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
    }

    #bar {
      display: flex;
      height: 10vh;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      background: #383a40;
      color: white;
    }

    button {
      padding: 10px;
      background: #5865f2;
      border: none;
      color: white;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="bar">
  <input id="msg" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://messages-chat-acesss.v987v654v321v0.workers.dev/api/chat";

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = m.user + ": " + m.text;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("msg");

  if (!input.value) return;

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user: "User",
      text: input.value
    })
  });

  input.value = "";
  load();
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
