<!DOCTYPE html>
<html>
<head>
  <title>Cloud Chat</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #1e1f22;
      color: white;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 200px;
      background: #2b2d31;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      border-right: 1px solid #1a1b1e;
    }

    .nav-btn {
      padding: 12px;
      background: #383a40;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .nav-btn:hover {
      background: #5865f2;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #filterBar {
      display: flex;
      padding: 10px;
      gap: 10px;
      background: #2b2d31;
      border-bottom: 1px solid #1a1b1e;
    }

    #filterInput {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #383a40;
      color: white;
    }

    #filterBtn {
      padding: 8px 12px;
      background: #5865f2;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      background: #2b2d31;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .private {
      border-left: 3px solid #f04747;
      background: #2f2323;
    }

    .private i {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      background: #383a40;
      flex-shrink: 0;
      cursor: pointer;
    }

    .message-body {
      flex: 1;
      min-width: 0;
    }

    .user {
      font-weight: bold;
      color: #5865f2;
    }

    .time {
      font-size: 11px;
      opacity: 0.5;
      margin-left: 6px;
    }

    #emojiBar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px;
      background: #2b2d31;
      border-top: 1px solid #1a1b1e;
    }

    .emoji {
      font-size: 20px;
      padding: 6px;
      cursor: pointer;
      border-radius: 6px;
      background: #383a40;
    }

    .emoji:hover {
      background: #5865f2;
    }

    #bar {
      display: flex;
      padding: 10px;
      background: #2b2d31;
      border-top: 1px solid #1a1b1e;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #383a40;
      color: white;
    }

    button.send {
      padding: 10px;
      background: #5865f2;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    button.send:hover {
      background: #4752c4;
    }

    #privateMenu,
    #profileMenu,
    #userProfilePopup {
      position: absolute;
      left: 220px;
      background: #2b2d31;
      border: 1px solid #111;
      padding: 10px;
      border-radius: 8px;
      display: none;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 999;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    #privateMenu {
      bottom: 70px;
      gap: 5px;
    }

    #profileMenu {
      top: 20px;
      width: 300px;
    }

    #userProfilePopup {
      width: 300px;
      left: auto;
      top: auto;
    }

    .user-option {
      padding: 6px;
      background: #383a40;
      border-radius: 6px;
      cursor: pointer;
    }

    .user-option:hover {
      background: #5865f2;
    }

    .profile-pic-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .profile-choice {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      background: #383a40;
      box-sizing: border-box;
    }

    .profile-choice.selected {
      border-color: #5865f2;
      outline: 2px solid rgba(88,101,242,0.35);
    }

    .profile-label {
      font-size: 13px;
      font-weight: bold;
      margin-top: 2px;
    }

    #descInput {
      width: 100%;
      box-sizing: border-box;
    }

    .profile-actions {
      display: flex;
      gap: 8px;
    }

    .profile-actions button {
      flex: 1;
      padding: 10px;
      background: #5865f2;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .profile-actions button:hover {
      background: #4752c4;
    }

    .popup-header {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .popup-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      background: #383a40;
      flex-shrink: 0;
    }

    .popup-name {
      font-weight: bold;
      color: #5865f2;
      font-size: 16px;
    }

    .popup-desc {
      font-size: 13px;
      opacity: 0.85;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .recent-messages {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .recent-message {
      background: #383a40;
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }

    .recent-empty {
      opacity: 0.7;
      font-size: 13px;
    }

    .current-pic-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .current-pic-preview {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: #383a40;
      border: 2px solid #383a40;
    }

    .current-pic-text {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <button class="nav-btn" onclick="go('/news/main')">🔐 Login</button>
  <button class="nav-btn" onclick="go('/news/account.html')">⚙️ Settings</button>
  <button class="nav-btn" onclick="go('https://v987v654v321v0-dot.github.io/ARTGAME.html')">🕹️ Play Guess the Drawing</button>
  <button class="nav-btn" onclick="go('https://v987v654v321v0-dot.github.io/Services/Wallet/Plan')">💰 Use Tokens to Buy Ultra Plan</button>
  <button class="nav-btn" onclick="go('https://v987v654v321v0-dot.github.io/Services/Wallet/Plan')">💳 Check Token Wallet</button>
  <button class="nav-btn" onclick="toggleNotify(event)">🔔 Notify: OFF</button>
  <button class="nav-btn" id="editProfileBtn" onclick="toggleProfileMenu(event)">👤 Edit Profile</button>
</div>

<div id="main">

  <div id="filterBar">
    <input id="filterInput" placeholder="Filter by username..." />
    <button id="filterBtn" onclick="applyFilter()">Filter</button>
  </div>

  <div id="chat"></div>

  <div id="emojiBar">
    <span class="emoji" onclick="sendEmoji('🔥')">🔥</span>
    <span class="emoji" onclick="sendEmoji('😂')">😂</span>
    <span class="emoji" onclick="sendEmoji('❤️')">❤️</span>
    <span class="emoji" onclick="sendEmoji('👍')">👍</span>
    <span class="emoji" onclick="sendEmoji('😎')">😎</span>
    <span class="emoji" onclick="sendEmoji('😭')">😭</span>
    <span class="emoji" onclick="sendEmoji('🎉')">🎉</span>
    <span class="emoji" onclick="sendEmoji('😡')">😡</span>
    <span class="emoji" onclick="sendEmoji('🤯')">🤯</span>
    <span class="emoji" onclick="sendEmoji('👀')">👀</span>
  </div>

  <div id="privateMenu"></div>

  <div id="profileMenu">
    <div class="profile-label">Current profile picture</div>
    <div class="current-pic-row">
      <img id="currentPicPreview" class="current-pic-preview" src="user.png" onerror="this.src='user.png'">
      <div class="current-pic-text" id="currentPicText">No picture selected</div>
    </div>

    <div class="profile-label">Choose profile picture</div>
    <div id="profilePicGrid" class="profile-pic-grid"></div>

    <div class="profile-label">Description</div>
    <input id="descInput" placeholder="Set your description..." />

    <div class="profile-actions">
      <button onclick="saveProfile()">Save</button>
      <button onclick="closeProfileMenu()">Close</button>
    </div>
  </div>

  <div id="userProfilePopup"></div>

  <div id="bar">
    <input id="msg" placeholder="Type message..." />
    <button class="send" onclick="send()">Send</button>
    <button class="send" id="privateBtn" onclick="togglePrivateMenu(event)">Private</button>
  </div>

</div>

<script>
const API = "https://messages-chat-acesss.v987v654v321v0.workers.dev/api/chat";
const ACCOUNT_API = API.replace(/\/api\/chat\/?$/, "/api/account");

const PROFILE_PICS = [
  "cat.jpg",
  "shrek.jpeg",
  "cat2.jpg",
  "nuke.jpeg",
  "sushi.jpeg",
  "burger.jpeg",
  "background.jpg",
  "enstein.jpeg",
  "warrior.jpeg"
];

const DEFAULT_PROFILE_PIC = "user.png";

let notifyEnabled = false;
let lastMessageCount = 0;
let username = localStorage.getItem("username");
let activeFilter = "";
let users = new Set();
let profileCache = {};
let selectedProfilePic = null;
let lastLoadedMessages = [];
let lastDataSignature = null;
let isFirstLoad = true;
let currentChatData = [];
let activeLoadToken = 0;

if (!username) {
  window.location.href = "https://v987v654v321v0-dot.github.io/news/main";
}

function toggleNotify(e) {
  notifyEnabled = !notifyEnabled;
  e.target.innerText = "🔔 Notify: " + (notifyEnabled ? "ON" : "OFF");
}

function go(url) {
  window.location.href = url;
}

function applyFilter() {
  activeFilter = document.getElementById("filterInput").value.trim();
  renderChat();
}

function formatText(text) {
  return text
    .replace(/##(.*?)##/g, "<b>$1</b>")
    .replace(/#(.*?)#/g, "<i>$1</i>");
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

async function fetchProfile(user) {
  if (profileCache[user]) return profileCache[user];

  try {
    const res = await fetch(ACCOUNT_API + "?user=" + encodeURIComponent(user));
    const data = await res.json();
    profileCache[user] = data || {};
    return data || {};
  } catch {
    profileCache[user] = {};
    return {};
  }
}

async function fetchMyProfile() {
  const mine = await fetchProfile(username);
  selectedProfilePic = mine.profilePic || "";
  document.getElementById("descInput").value = mine.description || "";
  renderProfileChoices();
  renderCurrentPicPreview();
}

function renderCurrentPicPreview() {
  const preview = document.getElementById("currentPicPreview");
  const text = document.getElementById("currentPicText");
  const pic = selectedProfilePic || DEFAULT_PROFILE_PIC;

  preview.src = pic;
  text.textContent = selectedProfilePic || "No picture selected (using user.png)";
}

function renderProfileChoices() {
  const grid = document.getElementById("profilePicGrid");
  grid.innerHTML = "";

  PROFILE_PICS.forEach(pic => {
    const img = document.createElement("img");
    img.src = pic;
    img.className = "profile-choice";

    if (selectedProfilePic === pic) {
      img.classList.add("selected");
    }

    img.addEventListener("click", (e) => {
      e.stopPropagation();
      selectedProfilePic = pic;
      renderProfileChoices();
      renderCurrentPicPreview();
    });

    grid.appendChild(img);
  });
}

function toggleProfileMenu(e) {
  if (e) e.stopPropagation();

  const menu = document.getElementById("profileMenu");
  const isOpen = menu.style.display === "flex";

  if (isOpen) {
    closeProfileMenu();
  } else {
    menu.style.display = "flex";
    fetchMyProfile();
  }
}

function closeProfileMenu() {
  document.getElementById("profileMenu").style.display = "none";
}

async function saveProfile() {
  const description = document.getElementById("descInput").value;

  await fetch(ACCOUNT_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user: username,
      profilePic: selectedProfilePic || "",
      description: description
    })
  });

  profileCache[username] = {
    profilePic: selectedProfilePic || "",
    description: description
  };

  closeProfileMenu();
  renderChat();
}

function getVisibleRecentMessagesForUser(user) {
  const result = [];

  for (let i = lastLoadedMessages.length - 1; i >= 0; i--) {
    const m = lastLoadedMessages[i];
    if (m.user !== user) continue;
    if (/^%(.*?)% /.test(m.text)) continue;
    if (m.text.includes("{{{")) continue;

    result.push(m);
    if (result.length >= 5) break;
  }

  return result;
}

async function openUserProfilePopup(user, anchorEl) {
  const popup = document.getElementById("userProfilePopup");
  const profile = await fetchProfile(user);
  const pic = profile.profilePic || DEFAULT_PROFILE_PIC;
  const desc = profile.description || "No description set.";
  const recent = getVisibleRecentMessagesForUser(user);

  popup.innerHTML = `
    <div class="popup-header">
      <img class="popup-avatar" src="${pic}" onerror="this.src='${DEFAULT_PROFILE_PIC}'">
      <div>
        <div class="popup-name">${escapeHtml(user)}</div>
      </div>
    </div>
    <div class="profile-label">Description</div>
    <div class="popup-desc">${escapeHtml(desc)}</div>
    <div class="profile-label">Recent messages</div>
    <div class="recent-messages">
      ${
        recent.length
          ? recent.map(m => `<div class="recent-message">${formatText(escapeHtml(m.text))}</div>`).join("")
          : `<div class="recent-empty">No recent public messages.</div>`
      }
    </div>
  `;

  popup.style.display = "flex";

  const rect = anchorEl.getBoundingClientRect();
  const mainRect = document.getElementById("main").getBoundingClientRect();

  let left = rect.right - mainRect.left + 10;
  let top = rect.top - mainRect.top;

  popup.style.left = left + "px";
  popup.style.top = top + "px";

  requestAnimationFrame(() => {
    const popupRect = popup.getBoundingClientRect();
    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;

    if (popupRect.right > viewportWidth - 10) {
      left = rect.left - mainRect.left - popupRect.width - 10;
      popup.style.left = Math.max(10, left) + "px";
    }

    if (popupRect.bottom > viewportHeight - 10) {
      top = Math.max(10, viewportHeight - popupRect.height - 10 - mainRect.top);
      popup.style.top = top + "px";
    }
  });
}

function hideUserProfilePopup() {
  document.getElementById("userProfilePopup").style.display = "none";
}

function processVisibleMessages(data) {
  const visibleMessages = [];
  const nextUsers = new Set();

  for (const m of data) {
    nextUsers.add(m.user);

    let text = m.text;
    let isPrivate = false;
    let visible = true;

    if (text.includes("{{{") && m.user === username) {
      visible = false;
    }

    if (!visible) continue;

    const match = text.match(/^%(.*?)% (.*)/);

    if (match) {
      const targetUser = match[1].trim();
      const actualMessage = match[2];
      isPrivate = true;

      if (
        username !== targetUser &&
        username !== m.user &&
        username !== "admin-account"
      ) {
        continue;
      }

      if (username === "admin-account") {
        text = `<i style="color:#f04747;">(private → ${targetUser})</i>${actualMessage}`;
      } else if (username === targetUser) {
        text = `<i style="color:#43b581;">(private to you)</i>${actualMessage}`;
      } else {
        text = `<i style="color:#faa61a;">(private to ${targetUser})</i>${actualMessage}`;
      }
    }

    if (activeFilter && m.user !== activeFilter) continue;

    visibleMessages.push({
      original: m,
      displayText: text,
      isPrivate
    });
  }

  users = nextUsers;
  lastLoadedMessages = visibleMessages.map(item => ({
    user: item.original.user,
    text: item.original.text,
    time: item.original.time
  }));

  return visibleMessages;
}

async function renderChat(loadToken = activeLoadToken) {
  const visibleMessages = processVisibleMessages(currentChatData);
  const fragment = document.createDocumentFragment();

  for (const item of visibleMessages) {
    if (loadToken !== activeLoadToken) return;

    const m = item.original;
    const profile = await fetchProfile(m.user);

    if (loadToken !== activeLoadToken) return;

    const pic = profile.profilePic || DEFAULT_PROFILE_PIC;
    const div = document.createElement("div");
    div.className = "msg";

    if (item.isPrivate) {
      div.classList.add("private");
    }

    const time = new Date(m.time).toLocaleTimeString();

    div.innerHTML = `
      <img class="avatar" src="${pic}" onerror="this.src='${DEFAULT_PROFILE_PIC}'">
      <div class="message-body">
        <span class="user">${escapeHtml(m.user)}</span>
        <span class="time">[${time}]</span>
        <div>${formatText(item.displayText)}</div>
      </div>
    `;

    const avatar = div.querySelector(".avatar");
    avatar.addEventListener("click", (e) => {
      e.stopPropagation();
      openUserProfilePopup(m.user, avatar);
    });

    fragment.appendChild(div);
  }

  if (loadToken !== activeLoadToken) return;

  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  chat.appendChild(fragment);

  renderUserMenu();

  if (isFirstLoad) {
    chat.scrollTop = chat.scrollHeight;
    isFirstLoad = false;
  }
}

async function load() {
  const loadToken = ++activeLoadToken;

  let res;

  try {
    res = await fetch(API);
  } catch (err) {
    console.error("Fetch failed:", err);
    return;
  }

  if (loadToken !== activeLoadToken) return;

  if (!res.ok) {
    console.error("Chat API error:", res.status);
    return;
  }

  let data;
  try {
    data = await res.json();
  } catch (err) {
    console.error("Invalid JSON:", err);
    return;
  }

  if (loadToken !== activeLoadToken) return;

  if (
    notifyEnabled &&
    document.hidden &&
    data.length > lastMessageCount
  ) {
    new Audio("notify.mp3").play();
  }

  lastMessageCount = data.length;

  const newSignature = JSON.stringify(data);

  if (newSignature === lastDataSignature) {
    return;
  }

  lastDataSignature = newSignature;
  currentChatData = data;
  await renderChat(loadToken);
}

function togglePrivateMenu(e) {
  if (e) e.stopPropagation();
  const menu = document.getElementById("privateMenu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function renderUserMenu() {
  const menu = document.getElementById("privateMenu");
  menu.innerHTML = "";

  users.forEach(u => {
    if (u === username) return;

    const div = document.createElement("div");
    div.className = "user-option";
    div.textContent = u;

    div.onclick = () => {
      sendPrivate(u);
      menu.style.display = "none";
    };

    menu.appendChild(div);
  });
}

function sendPrivate(target) {
  const input = document.getElementById("msg");
  if (!input.value) return;
  send(`%${target}% ${input.value}`);
}

async function send(textOverride = null) {
  const input = document.getElementById("msg");
  const text = textOverride || input.value;

  if (!text) return;

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user: username,
      text: text
    })
  });

  input.value = "";
  load();
}

function sendEmoji(e) {
  send(e);
}

document.getElementById("msg").addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});

document.addEventListener("click", (e) => {
  const popup = document.getElementById("userProfilePopup");
  const profileMenu = document.getElementById("profileMenu");
  const privateMenu = document.getElementById("privateMenu");
  const editProfileBtn = document.getElementById("editProfileBtn");
  const privateBtn = document.getElementById("privateBtn");

  if (popup.style.display === "flex" && !popup.contains(e.target)) {
    hideUserProfilePopup();
  }

  if (
    profileMenu.style.display === "flex" &&
    !profileMenu.contains(e.target) &&
    !editProfileBtn.contains(e.target)
  ) {
    closeProfileMenu();
  }

  if (
    privateMenu.style.display === "flex" &&
    !privateMenu.contains(e.target) &&
    !privateBtn.contains(e.target)
  ) {
    privateMenu.style.display = "none";
  }
});

setInterval(load, 2000);
load();
</script>

</body>
</html>
