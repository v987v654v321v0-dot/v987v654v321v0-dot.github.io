<!DOCTYPE html>
<html>
<head>
  <title>Cloud Chat</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #1e1f22;
      color: white;
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    #sidebar {
      width: 200px;
      background: #2b2d31;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      border-right: 1px solid #1a1b1e;
    }

    .nav-btn {
      padding: 12px;
      background: #383a40;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .nav-btn:hover {
      background: #5865f2;
    }

    /* MAIN */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      background: #2b2d31;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      font-weight: bold;
      color: #5865f2;
    }

    .time {
      font-size: 11px;
      opacity: 0.5;
      margin-left: 6px;
    }

    #bar {
      display: flex;
      padding: 10px;
      background: #2b2d31;
      border-top: 1px solid #1a1b1e;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #383a40;
      color: white;
    }

    button.send {
      margin-left: 10px;
      padding: 10px;
      background: #5865f2;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    /* 🔥 EMOJI PANEL */
    #emojiBar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px;
      background: #2b2d31;
      border-top: 1px solid #1a1b1e;
    }

    .emoji {
      font-size: 20px;
      padding: 6px;
      cursor: pointer;
      border-radius: 6px;
      background: #383a40;
    }

    .emoji:hover {
      background: #5865f2;
    }

    /* 🔍 FILTER BAR */
    #filterBar {
      display: flex;
      padding: 10px;
      gap: 10px;
      background: #2b2d31;
      border-bottom: 1px solid #1a1b1e;
    }

    #filterInput {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #383a40;
      color: white;
    }

    #filterBtn {
      padding: 8px 12px;
      background: #5865f2;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div id="sidebar">
  <button class="nav-btn" onclick="go('/news/main')">🔐 Login</button>
  <button class="nav-btn" onclick="go('/news/newsacessscodeequal9810')">📰 News</button>
  <button class="nav-btn" onclick="go('/news/account.html')">⚙️ Settings</button>
</div>

<div id="main">

  <!-- 🔍 FILTER -->
  <div id="filterBar">
    <input id="filterInput" placeholder="Filter by username..." />
    <button id="filterBtn" onclick="applyFilter()">Filter</button>
  </div>

  <div id="chat"></div>

  <!-- 😀 EMOJIS -->
  <div id="emojiBar">
    <span class="emoji" onclick="sendEmoji('🔥')">🔥</span>
    <span class="emoji" onclick="sendEmoji('😂')">😂</span>
    <span class="emoji" onclick="sendEmoji('❤️')">❤️</span>
    <span class="emoji" onclick="sendEmoji('👍')">👍</span>
    <span class="emoji" onclick="sendEmoji('😎')">😎</span>
    <span class="emoji" onclick="sendEmoji('😭')">😭</span>
    <span class="emoji" onclick="sendEmoji('🎉')">🎉</span>
    <span class="emoji" onclick="sendEmoji('😡')">😡</span>
    <span class="emoji" onclick="sendEmoji('🤯')">🤯</span>
    <span class="emoji" onclick="sendEmoji('👀')">👀</span>
  </div>

  <div id="bar">
    <input id="msg" placeholder="Type message..." />
    <button class="send" onclick="send()">Send</button>
  </div>

</div>

<script>
const API = "https://messages-chat-acesss.v987v654v321v0.workers.dev/api/chat";

function go(url) {
  window.location.href = url;
}

let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your username:");
  localStorage.setItem("username", username);
}

// 🔍 FILTER STATE
let activeFilter = "";

// FORMAT TEXT
function formatText(text) {
  return text
    .replace(/##(.*?)##/g, "<b>$1</b>")
    .replace(/#(.*?)#/g, "<i>$1</i>");
}

// APPLY FILTER
function applyFilter() {
  activeFilter = document.getElementById("filterInput").value.trim();
  load();
}

// LOAD
async function load() {
  const res = await fetch(API);
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(m => {
    if (activeFilter && m.user !== activeFilter) return;

    const div = document.createElement("div");
    div.className = "msg";

    const time = new Date(m.time).toLocaleTimeString();

    div.innerHTML = `
      <span class="user">${m.user}</span>
      <span class="time">[${time}]</span><br>
      ${formatText(m.text)}
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

// SEND MESSAGE
async function send(textOverride = null) {
  const input = document.getElementById("msg");
  const text = textOverride || input.value;

  if (!text) return;

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user: username,
      text: text
    })
  });

  input.value = "";
  load();
}

// 😀 SEND EMOJI
function sendEmoji(emoji) {
  send(emoji);
}

// ENTER KEY
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

setInterval(load, 2000);
load();
</script>

</body>
</html>
