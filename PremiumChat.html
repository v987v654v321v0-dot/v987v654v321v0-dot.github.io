<!DOCTYPE html>
<html>
<head>
  <title>Cloud Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #313338;
      color: white;
    }

    #chat {
      height: 90vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      background: #2b2d31;
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
    }

    .user {
      font-weight: bold;
      color: #5865f2;
    }

    #bar {
      display: flex;
      height: 10vh;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      background: #383a40;
      color: white;
    }

    button {
      padding: 10px;
      background: #5865f2;
      border: none;
      color: white;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="bar">
  <input id="msg" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://messages-chat-acesss.v987v654v321v0.workers.dev/api/chat";

// 🔥 USERNAME SETUP
let username = localStorage.getItem("username");

if (!username) {
  username = prompt("Enter your username:");
  localStorage.setItem("username", username);
}

// Load messages
async function load() {
  const res = await fetch(API);
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";

    const time = new Date(m.time).toLocaleTimeString();

    div.innerHTML = `
      <span class="user">${m.user}</span> 
      <small style="opacity:0.6;">[${time}]</small><br>
      ${m.text}
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

// Send message
async function send() {
  const input = document.getElementById("msg");

  if (!input.value) return;

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user: username,
      text: input.value
    })
  });

  input.value = "";
  load();
}

// Auto refresh
setInterval(load, 2000);
load();
</script>

</body>
</html>
