<!DOCTYPE html>
<html>
<head>
  <title>Cloud Chat</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #1e1f22;
      color: white;
      display: flex;
      height: 100vh;
    }

    /* 🔥 SIDEBAR */
    #sidebar {
      width: 200px;
      background: #2b2d31;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      border-right: 1px solid #1a1b1e;
    }

    .nav-btn {
      padding: 12px;
      background: #383a40;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      text-align: left;
      font-weight: bold;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: #5865f2;
    }

    /* MAIN AREA */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      background: #2b2d31;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 70%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .user {
      font-weight: bold;
      color: #5865f2;
    }

    .time {
      font-size: 11px;
      opacity: 0.5;
      margin-left: 6px;
    }

    #bar {
      display: flex;
      padding: 10px;
      background: #2b2d31;
      border-top: 1px solid #1a1b1e;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #383a40;
      color: white;
      outline: none;
    }

    button.send {
      margin-left: 10px;
      padding: 12px 16px;
      background: #5865f2;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    button.send:hover {
      background: #4752c4;
    }
  </style>
</head>

<body>

<!-- 🔥 SIDEBAR -->
<div id="sidebar">
  <button class="nav-btn" onclick="go('/news/main')">🔐 Login</button>
  <button class="nav-btn" onclick="go('/news/newsacessscodeequal9810')">📰 News</button>
  <button class="nav-btn" onclick="go('/news/account.html')">⚙️ Settings</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="chat"></div>

  <div id="bar">
    <input id="msg" placeholder="Type message..." />
    <button class="send" onclick="send()">Send</button>
  </div>
</div>

<script>
const API = "https://messages-chat-acesss.v987v654v321v0.workers.dev/api/chat";

// NAVIGATION FUNCTION 🔥
function go(url) {
  window.location.href = url;
}

// USERNAME
let username = localStorage.getItem("username");

if (!username) {
  username = prompt("Enter your username:");
  localStorage.setItem("username", username);
}

// FORMAT TEXT
function formatText(text) {
  return text
    .replace(/##(.*?)##/g, "<b>$1</b>")
    .replace(/#(.*?)#/g, "<i>$1</i>");
}

// LOAD MESSAGES
async function load() {
  const res = await fetch(API);
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";

    const time = new Date(m.time).toLocaleTimeString();

    div.innerHTML = `
      <span class="user">${m.user}</span>
      <span class="time">[${time}]</span><br>
      ${formatText(m.text)}
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

// SEND MESSAGE
async function send() {
  const input = document.getElementById("msg");

  if (!input.value) return;

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user: username,
      text: input.value
    })
  });

  input.value = "";
  load();
}

// ENTER KEY
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

// AUTO REFRESH
setInterval(load, 2000);
load();
</script>

</body>
</html>
