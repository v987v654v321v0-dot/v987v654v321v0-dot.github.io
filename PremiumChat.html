<!DOCTYPE html>
<html>
<head>
  <title>Cloud Chat</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #1e1f22;
      color: white;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 200px;
      background: #2b2d31;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      border-right: 1px solid #1a1b1e;
    }

    .nav-btn {
      padding: 12px;
      background: #383a40;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .nav-btn:hover {
      background: #5865f2;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #filterBar {
      display: flex;
      padding: 10px;
      gap: 10px;
      background: #2b2d31;
      border-bottom: 1px solid #1a1b1e;
    }

    #filterInput {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #383a40;
      color: white;
    }

    #filterBtn {
      padding: 8px 12px;
      background: #5865f2;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      background: #2b2d31;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .private {
      border-left: 3px solid #f04747;
      background: #2f2323;
    }

    .private i {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .user {
      font-weight: bold;
      color: #5865f2;
    }

    .time {
      font-size: 11px;
      opacity: 0.5;
      margin-left: 6px;
    }

    #emojiBar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px;
      background: #2b2d31;
      border-top: 1px solid #1a1b1e;
    }

    .emoji {
      font-size: 20px;
      padding: 6px;
      cursor: pointer;
      border-radius: 6px;
      background: #383a40;
    }

    .emoji:hover {
      background: #5865f2;
    }

    #bar {
      display: flex;
      padding: 10px;
      background: #2b2d31;
      border-top: 1px solid #1a1b1e;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #383a40;
      color: white;
    }

    button.send {
      padding: 10px;
      background: #5865f2;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    button.send:hover {
      background: #4752c4;
    }

    /* 🔥 PRIVATE MENU */
    #privateMenu {
      position: absolute;
      bottom: 70px;
      left: 220px;
      background: #2b2d31;
      border: 1px solid #111;
      padding: 10px;
      border-radius: 8px;
      display: none;
      flex-direction: column;
      gap: 5px;
      max-height: 200px;
      overflow-y: auto;
    }

    .user-option {
      padding: 6px;
      background: #383a40;
      border-radius: 6px;
      cursor: pointer;
    }

    .user-option:hover {
      background: #5865f2;
    }

  </style>
</head>

<body>

<div id="sidebar">
  <button class="nav-btn" onclick="go('/news/main')">🔐 Login</button>
  <button class="nav-btn" onclick="go('/news/account.html')">⚙️ Settings</button>
</div>

<div id="main">

  <div id="filterBar">
    <input id="filterInput" placeholder="Filter by username..." />
    <button id="filterBtn" onclick="applyFilter()">Filter</button>
  </div>

  <div id="chat"></div>

  <div id="emojiBar">
    <span class="emoji" onclick="sendEmoji('🔥')">🔥</span>
    <span class="emoji" onclick="sendEmoji('😂')">😂</span>
    <span class="emoji" onclick="sendEmoji('❤️')">❤️</span>
    <span class="emoji" onclick="sendEmoji('👍')">👍</span>
    <span class="emoji" onclick="sendEmoji('😎')">😎</span>
    <span class="emoji" onclick="sendEmoji('😭')">😭</span>
    <span class="emoji" onclick="sendEmoji('🎉')">🎉</span>
    <span class="emoji" onclick="sendEmoji('😡')">😡</span>
    <span class="emoji" onclick="sendEmoji('🤯')">🤯</span>
    <span class="emoji" onclick="sendEmoji('👀')">👀</span>
  </div>

  <!-- 🔥 PRIVATE MENU -->
  <div id="privateMenu"></div>

  <div id="bar">
    <input id="msg" placeholder="Type message..." />
    <button class="send" onclick="send()">Send</button>
    <button class="send" onclick="togglePrivateMenu()">Private</button>
  </div>

</div>

<script>
const API = "https://messages-chat-acesss.v987v654v321v0.workers.dev/api/chat";

function go(url) {
  window.location.href = url;
}

let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your username:");
  localStorage.setItem("username", username);
}

let activeFilter = "";
let users = new Set();

function applyFilter() {
  activeFilter = document.getElementById("filterInput").value.trim();
  load();
}

function formatText(text) {
  return text
    .replace(/##(.*?)##/g, "<b>$1</b>")
    .replace(/#(.*?)#/g, "<i>$1</i>");
}

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  users.clear();

  data.forEach(m => {

    users.add(m.user);

    let text = m.text;
    let isPrivate = false;

    let match = text.match(/^%(.*?)% (.*)/);

    if (match) {
      const targetUser = match[1].trim();
      const actualMessage = match[2];

      isPrivate = true;

      if (
        username !== targetUser &&
        username !== m.user &&
        username !== "admin-account"
      ) return;

      if (username === "admin-account") {
        text = `<i style="color:#f04747;">(private → ${targetUser})</i>${actualMessage}`;
      }
      else if (username === targetUser) {
        text = `<i style="color:#43b581;">(private to you)</i>${actualMessage}`;
      }
      else {
        text = `<i style="color:#faa61a;">(private to ${targetUser})</i>${actualMessage}`;
      }
    }

    if (activeFilter && m.user !== activeFilter) return;

    const div = document.createElement("div");
    div.className = "msg";

    if (isPrivate) div.classList.add("private");

    const time = new Date(m.time).toLocaleTimeString();

    div.innerHTML = `
      <span class="user">${m.user}</span>
      <span class="time">[${time}]</span><br>
      ${formatText(text)}
    `;

    chat.appendChild(div);
  });

  renderUserMenu();
  chat.scrollTop = chat.scrollHeight;
}

// 🔥 PRIVATE MENU
function togglePrivateMenu() {
  const menu = document.getElementById("privateMenu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function renderUserMenu() {
  const menu = document.getElementById("privateMenu");
  menu.innerHTML = "";

  users.forEach(u => {
    if (u === username) return;

    const div = document.createElement("div");
    div.className = "user-option";
    div.textContent = u;

    div.onclick = () => {
      sendPrivate(u);
      menu.style.display = "none";
    };

    menu.appendChild(div);
  });
}

function sendPrivate(target) {
  const input = document.getElementById("msg");
  if (!input.value) return;

  send(`%${target}% ${input.value}`);
}

async function send(textOverride = null) {
  const input = document.getElementById("msg");
  const text = textOverride || input.value;

  if (!text) return;

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user: username,
      text: text
    })
  });

  input.value = "";
  load();
}

function sendEmoji(e) {
  send(e);
}

document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

setInterval(load, 2000);
load();
</script>

</body>
</html>
