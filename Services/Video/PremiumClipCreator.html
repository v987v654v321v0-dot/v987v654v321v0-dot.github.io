<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Editor</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
}

/* Layout */
.preview {
  height: 60vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#canvas {
  width: 800px;
  height: 450px;
  background: black;
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

/* Timeline */
.timeline-container {
  height: 40vh;
  background: #181818;
  padding: 10px;
}

.timeline {
  position: relative;
  height: 120px;
  background: #222;
  border-radius: 8px;
  overflow: hidden;
}

.clip {
  position: absolute;
  height: 40px;
  background: #4CAF50;
  border-radius: 5px;
  padding: 5px;
  font-size: 12px;
}

/* Playhead */
.playhead {
  position: absolute;
  width: 2px;
  height: 100%;
  background: red;
  left: 0;
}

/* Controls */
.controls {
  margin-top: 10px;
}

button {
  padding: 8px;
  margin: 5px;
  background: #4CAF50;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #66d36c;
}

.element {
  position: absolute;
}
</style>
</head>

<body>

<div class="preview">
  <div id="canvas"></div>
</div>

<div class="timeline-container">
  <div class="timeline" id="timeline">
    <div class="playhead" id="playhead"></div>
  </div>

  <div class="controls">
    <button onclick="play()">▶ Play</button>
    <button onclick="stop()">⏹ Stop</button>
    <button onclick="addDemo()">➕ Add Demo Clip</button>
    <span>Time: <span id="timeDisplay">0.00</span>s</span>
  </div>
</div>

<script src="script3.js"></script>
</body>
</html>
