<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Creator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Video Creator</div>
      <div class="small">
        Smoother player • Persistent overlays • Video-clock synced playback
      </div>
    </div>

    <div class="main">
      <aside class="sidebar">
        <div class="panel">
          <h3>Project</h3>

          <label for="videoLength">Video length (seconds)</label>
          <input id="videoLength" type="number" min="1" step="1" value="10" />

          <label for="videoImport">Import video</label>
          <input id="videoImport" type="file" accept="video/*" />

          <div class="hint">
            Imported video becomes the background video.
          </div>
        </div>

        <div class="panel">
          <h3>Add Text</h3>

          <label for="textContent">Text content</label>
          <input id="textContent" type="text" placeholder="Type text here" />

          <button id="addTextBtn" type="button">Add Text</button>
        </div>

        <div class="panel">
          <h3>Add Image</h3>

          <label for="imageSelect">Image</label>
          <select id="imageSelect"></select>

          <button id="addImageBtn" type="button">Add Image</button>

          <div class="hint">
            Images are loaded from <code>../../../filename</code>
          </div>
        </div>

        <div class="panel">
          <h3>Selected Element</h3>

          <label for="selectedType">Type</label>
          <input id="selectedType" type="text" readonly />

          <label for="selectedText">Text content</label>
          <input id="selectedText" type="text" placeholder="Edit selected text" />

          <label for="selectedRotation">Rotation</label>
          <input id="selectedRotation" type="number" step="1" placeholder="Degrees" />

          <label for="selectedWidth">Image width</label>
          <input id="selectedWidth" type="number" step="1" placeholder="Pixels" />

          <div class="btn-row">
            <button id="updateSelectedBtn" type="button">Update</button>
            <button id="deleteSelectedBtn" type="button" class="danger">Delete</button>
          </div>
        </div>

        <div class="panel">
          <h3>Save / Load</h3>
          <button id="exportJsonBtn" type="button">Export JSON</button>

          <label for="importJson">Import JSON project</label>
          <input id="importJson" type="file" accept=".json,application/json" />
        </div>
      </aside>

      <section class="workspace">
        <div class="preview-wrap">
          <div class="preview-shell">
            <div id="canvas">
              <video id="backgroundVideo" playsinline muted></video>
              <div id="overlayLayer"></div>
            </div>
          </div>
        </div>

        <div class="timeline-section">
          <div class="transport">
            <div class="transport-left">
              <button id="playBtn" type="button">Play</button>
              <button id="stopBtn" type="button">Stop</button>
              <button id="rewindBtn" type="button">Back to Start</button>
            </div>

            <div class="transport-right">
              <div class="status-pill">Time: <span id="timeDisplay">0.00</span>s</div>
            </div>
          </div>

          <div class="timeline-shell">
            <div class="timeline-ruler" id="timelineRuler"></div>
            <div class="timeline" id="timeline">
              <div class="playhead" id="playhead"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
