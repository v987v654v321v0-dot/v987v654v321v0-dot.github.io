<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Creator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
}

/* Layout */
.container {
  display: flex;
  height: 100vh;
}

/* Left panel */
.sidebar {
  width: 300px;
  background: #1a1a1a;
  padding: 15px;
  overflow-y: auto;
  border-right: 1px solid #333;
}

/* Right panel */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Canvas */
#canvas {
  width: 800px;
  height: 450px;
  background: black;
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

.element {
  position: absolute;
  pointer-events: none;
}

/* Timeline */
.timeline {
  width: 800px;
  height: 60px;
  background: #181818;
  margin-top: 10px;
  border-radius: 8px;
  position: relative;
}

/* Controls */
.controls {
  margin-top: 10px;
}

/* Inputs */
input, select, button {
  width: 100%;
  margin-top: 5px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #2a2a2a;
  color: white;
}

button {
  background: #4CAF50;
  cursor: pointer;
}

button:hover {
  background: #66d36c;
}

h3 {
  margin-top: 20px;
  border-bottom: 1px solid #333;
  padding-bottom: 5px;
}
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🎬 Editor</h2>

    <button onclick="play()">▶ Play</button>
    <button onclick="stop()">⏹ Stop</button>
    <button onclick="exportJSON()">💾 Export JSON</button>

    <h3>Add Text</h3>
    <input id="textContent" placeholder="Text">
    <input id="textX" type="number" placeholder="X">
    <input id="textY" type="number" placeholder="Y">
    <input id="textStart" type="number" placeholder="Start Time">
    <input id="textEnd" type="number" placeholder="End Time">
    <button onclick="addText()">Add Text</button>

    <h3>Add Image</h3>
    <select id="imageSelect"></select>
    <input id="imgStart" type="number" placeholder="Start Time">
    <input id="imgEnd" type="number" placeholder="End Time">
    <input id="imgX" type="number" placeholder="Start X">
    <input id="imgY" type="number" placeholder="Start Y">
    <input id="imgX2" type="number" placeholder="End X">
    <input id="imgY2" type="number" placeholder="End Y">
    <button onclick="addImage()">Add Image</button>

  </div>

  <!-- Main area -->
  <div class="main">
    <div id="canvas"></div>

    <div class="timeline"></div>

    <div class="controls">
      <span>Time: <span id="timeDisplay">0.00</span>s</span>
    </div>
  </div>

</div>

<script src="script2.js"></script>
</body>
</html>
