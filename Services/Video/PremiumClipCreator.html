<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Editor</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
}

/* Preview */
.preview {
  height: 50vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#canvas {
  width: 800px;
  height: 450px;
  background: black;
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

/* Timeline */
.timeline-container {
  height: 50vh;
  background: #181818;
  padding: 10px;
}

.timeline {
  position: relative;
  height: 120px;
  background: #222;
  border-radius: 8px;
  overflow: hidden;
}

.clip {
  position: absolute;
  height: 40px;
  background: #4CAF50;
  border-radius: 5px;
  padding: 5px;
  font-size: 12px;
}

/* Playhead */
.playhead {
  position: absolute;
  width: 2px;
  height: 100%;
  background: red;
  left: 0;
}

/* Controls */
.controls {
  margin-top: 10px;
}

input, select, button {
  margin: 5px;
  padding: 6px;
  border-radius: 5px;
  border: none;
  background: #2a2a2a;
  color: white;
}

button {
  background: #4CAF50;
  cursor: pointer;
}

button:hover {
  background: #66d36c;
}

.element {
  position: absolute;
}
</style>
</head>

<body>

<div class="preview">
  <div id="canvas"></div>
</div>

<div class="timeline-container">
  <div class="timeline" id="timeline">
    <div class="playhead" id="playhead"></div>
  </div>

  <div class="controls">
    <button onclick="play()">▶ Play</button>
    <button onclick="stop()">⏹ Stop</button>

    Video Length:
    <input id="videoLength" type="number" value="10">

    <br>

    <!-- TEXT -->
    <input id="textContent" placeholder="Text">
    <input id="textStart" type="number" placeholder="Start">
    <input id="textEnd" type="number" placeholder="End">
    <button onclick="addText()">Add Text</button>

    <!-- IMAGE -->
    <select id="imageSelect"></select>
    <input id="imgStart" type="number" placeholder="Start">
    <input id="imgEnd" type="number" placeholder="End">
    <button onclick="addImage()">Add Image</button>

    <br>
    Time: <span id="timeDisplay">0.00</span>s
  </div>
</div>

<script src="script4.js"></script>
</body>
</html>
